    .nav {

      color: #00e676;

      text-decoration: none;

    }

    .container {
      max-width: 700px;
      margin: auto;
      padding: 40px 20px;
    }

    h1 {
      color: #00e676;
    }

    input, textarea {
      width: 100%;
      padding: 10px;

      border-radius: 5px;

    button {
      background: #00e676;

<body>

  <div class="nav">
    <a href="index.html">Home</a>

  <div class="container">
    <h1>Request a Bike Repair</h1>
    <p>Tell us what’s wrong with your bike and we’ll get back to you.</p>

<form action="https://formsubmit.co/moljonathon@gmail.com" method="POST">

  <input type="hidden" name="_subject" value="New Bike Repair Request">

  <input type="hidden" name="_captcha" value="false">

  <input type="hidden" name="_next" value="https://YOURUSERNAME.github.io/YOURREPOSITORY/thanks.html">

  <input type="text" name="Name" placeholder="Your Name" required>

  <input type="email" name="Email" placeholder="Your Email" required>

  <input type="text" name="Phone" placeholder="Phone Number (optional)">

  <textarea name="Problem" rows="6" placeholder="Describe what's wrong with your bike..." required></textarea>

  <button type="submit">Submit Repair Request</button>

</form>
