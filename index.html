<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>West Michigan Bike Revival</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0f0c;
      color: white;
    }

    .hero {
      height: 100vh;
      background: url("https://img.freepik.com/premium-photo/man-riding-mountain-bike-woods-with-helmet_327903-325859.jpg") center/cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.65);
    }

    .content {
      position: relative;
      z-index: 2;
      max-width: 700px;
      padding: 20px;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
    }

    p {
      font-size: 1.3rem;
      color: #cfcfcf;
    }

    .tagline {
      color: #00e676;
      font-weight: bold;
      margin: 10px 0 25px;
    }

    .btn {
      display: inline-block;
      margin: 10px;
      padding: 12px 20px;
      background: #00e676;
      color: black;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
    }

    .btn.secondary {
      background: transparent;
      border: 2px solid #00e676;
      color: #00e676;
    }

    .section {
      padding: 60px 20px;
      text-align: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      max-width: 900px;
      margin: auto;
    }

    .card {
      background: #121a14;
      padding: 20px;
      border-radius: 10px;
    }

    footer {
      text-align: center;
      padding: 30px;
      background: #070a08;
      color: #777;
    }
  </style>
</head>

<body>

  <div class="hero">
    <div class="overlay"></div>

    <div class="content">
      <h1>West Michigan Bike Revival</h1>
      <div class="tagline">Bringing Bikes Back to Life</div>
      <p>Professional bike repair & quality used bikes in West Michigan</p>

      <a href="repairs.html" class="btn">Request Repair</a>
      <a href="bikes.html" class="btn secondary">Shop Bikes</a>
    </div>
  </div>

  <div class="section">
    <h2>What We Do</h2>
    <div class="grid">
      <div class="card">Tune-Ups & Adjustments</div>
      <div class="card">Brake & Gear Repair</div>
      <div class="card">Flat Tire Repair</div>
      <div class="card">Full Bike Restorations</div>
    </div>
  </div>

  <footer>
    © 2026 West Michigan Bike Revival
  </footer>

</body>
</html>
